name: SonarCloud

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  sonarcloud:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npx vitest run tests/api.test.ts tests/data-integrity.test.ts tests/i18n.test.ts --coverage --coverage.reporter=lcov

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.organization=zupy
            -Dsonar.projectKey=zupy-fmartinelli_solana-glossary
            -Dsonar.sources=src
            -Dsonar.tests=tests
            -Dsonar.exclusions=**/node_modules/**,**/dist/**,**/*.json
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info
